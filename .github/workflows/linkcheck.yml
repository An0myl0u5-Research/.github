name: Link Check

on:
  pull_request:
  schedule:
    - cron: '23 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linkcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check links in Markdown
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --timeout 20
            --retry-wait-time 2
            --max-retries 2
            --exclude-mail
            --accept 200,201,202,204,206,301,302,303,307,308,429
            './**/*.md'
          fail: true
